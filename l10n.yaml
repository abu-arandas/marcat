# l10n.yaml
# Required for `flutter gen-l10n` to generate AppLocalizations from ARB files.
# flutter.generate: true in pubspec.yaml triggers this automatically on `flutter pub get`.

arb-dir: lib/l10n
template-arb-file: app_en.arb
output-localization-file: app_localizations.dart
output-class: AppLocalizations
nullable-getter: false
