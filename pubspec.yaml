name: marcat
description: Multi-store men's clothing platform for the Jordanian market
version: 1.0.0+1
publish_to: none

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

  # ── Supabase ─────────────────────────────────────────────────────────────
  supabase_flutter: ^2.9.1

  # ── Bootstrap UI ─────────────────────────────────────────────────────────
  flutter_bootstrap5: ^1.1.1+1

  # ── State Management ─────────────────────────────────────────────────────
  get: ^4.7.2

  # ── UI ────────────────────────────────────────────────────────────────────
  google_fonts: ^8.0.2
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  fl_chart: ^1.2.0
  mobile_scanner: ^7.0.1

  # ── Forms ────────────────────────────────────────────────────────────────
  reactive_forms: ^18.2.2

  # ── Storage ──────────────────────────────────────────────────────────────
  shared_preferences: ^2.3.5
  flutter_secure_storage: ^10.0.0

  # ── PDF & Print ───────────────────────────────────────────────────────────
  pdf: ^3.11.1
  printing: ^5.13.2

  # ── Utils ─────────────────────────────────────────────────────────────────
  uuid: ^4.5.3
  equatable: ^2.0.5
  photo_view: ^0.15.0
  image_picker: ^1.2.1
  flutter_dotenv: ^6.0.0
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - .env

  fonts:
    - family: PlayfairDisplay
      fonts:
        - asset: assets/fonts/PlayfairDisplay-Regular.ttf
        - asset: assets/fonts/PlayfairDisplay-Bold.ttf
          weight: 700
        - asset: assets/fonts/PlayfairDisplay-Italic.ttf
          style: italic
    - family: IBMPlexSansArabic
      fonts:
        - asset: assets/fonts/IBMPlexSansArabic-Regular.ttf
        - asset: assets/fonts/IBMPlexSansArabic-Medium.ttf
          weight: 500
        - asset: assets/fonts/IBMPlexSansArabic-Bold.ttf
          weight: 700
    - family: IBMPlexMono
      fonts:
        - asset: assets/fonts/IBMPlexMono-Regular.ttf
        - asset: assets/fonts/IBMPlexMono-Bold.ttf
          weight: 700